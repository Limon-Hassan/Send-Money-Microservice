version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

  # api-gateway:
  #   build:
  #     context: ./api-getways
  #   container_name: api-gateway
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NODE_ENV=production
  #     - AUTH_SERVICE_URL=http://auth-service:3002
  #     - USER_SERVICE_URL=http://user-service:3001
  #   depends_on:
  #     - auth-service
  #     - user-service
  #   restart: always

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://USER:PASSWORD@RDS_ENDPOINT:5432/auth_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your_jwt_secret
      - REFRESH_SECRET=your_refresh_secret
      - USER_SERVICE_API_URL=http://user-service:3001
    depends_on:
      - redis
    restart: always

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://USER:PASSWORD@RDS_ENDPOINT:5432/user_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: always

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: always